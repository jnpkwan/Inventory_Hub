/* ══════════════════ PHASE PILL COUNTS (month-level) ══════════════════ */
function computePhaseCounts() {
  const recs = S.records;
  const c = {p3:0, p4:0};
  recs.forEach(r => {
    const st = r.storeStatus||'';
    const fl = r.fulfillStatus||'';
    if(st!=='Approved') c.p3++;
    if(st==='Approved' && !['Actuals Logged','Partial'].includes(fl)) c.p4++;
  });
  return c;
}


function buildDetail(r) {
  // ── Build dispatch timeline (Phase 4) ─────────────────────────────────────
  let steps = [];
  if(r.route==='Direct') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → Store',d:r.dDirect,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else if(r.route==='Via SDC') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → SDC',d:r.dSdc,i:'🚚'},{l:'SDC → Store',d:r.dSdc2,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else if(r.route==='Via CDC') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → CDC',d:r.dCdc,i:'🚚'},{l:'CDC → Store',d:r.dCdc2,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'Dispatched',d:r.dSdc||r.dDirect||r.dCdc||'',i:'🚚'},{l:'Received',d:r.dRecv,i:'✅'}
  ];
  let lastDone=-1;
  steps.forEach((s,i)=>{if(s.d) lastDone=i;});
  const allDone = lastDone===steps.length-1;
  const isInTransit = r.status==='In Transit';
  const tl = steps.map((s,i)=>{
    let st;
    if(i<=lastDone) st='done';
    else if(!allDone && i===lastDone+1 && i!==steps.length-1) st=isInTransit?'active':'active-pending';
    else st='pending';
    return `<div class="ts ${st}"><div class="tc">${s.i}</div><div class="tl">${s.l}</div><div class="td2">${s.d?fmtD(s.d):'—'}</div></div>`;
  }).join('');
  const td = tdDays(r);

  // ── Role / permission flags ───────────────────────────────────────────────
  const uid  = esc(r.id||r.cdf);
  const role = S.user.role;
  const canEdit       = role==='EXECUTIVE'||role==='IS';
  const canDelete     = role==='EXECUTIVE';
  const canApproveSM  = role==='EXECUTIVE';
  const canApproveStore = role==='COORDINATOR'||role==='EXECUTIVE';
  const canFulfill    = role==='IS'||role==='EXECUTIVE';

  // ── Phase state values ────────────────────────────────────────────────────
  const smSt   = r.smgrStatus||'';
  const storeSt= r.storeStatus||'';
  const fulfSt = r.fulfillStatus||'';
  const pdfSt  = r.pdfStatus||'';
  const locked4 = smSt!=='Approved';
  const locked5 = storeSt!=='Approved';
  const dispatchUnlocked = ['Actuals Logged','Partial'].includes(fulfSt) || r.status==='Pending Dispatch' || r.status==='In Transit' || r.status==='Received';








  // ── Phase 3 panel — Approvals ─────────────────────────────────────────────
  const smBadge  = smSt==='Approved'?'wfs-approved':smSt==='Changes Requested'?'wfs-changes':'wfs-pending';
  const smActions = canApproveSM && smSt!=='Approved' ? `
    <div class="wf-actions">
      <button class="btn btn-approve" onclick="event.stopPropagation();openApprovalModal('${uid}','sm','approve')">✓ Approve</button>
      <button class="btn btn-changes" onclick="event.stopPropagation();openApprovalModal('${uid}','sm','changes')">✏ Request Changes</button>
    </div>` : '';
  const smResubmit = role==='IS' && smSt==='Changes Requested' ? `
    <div class="wf-actions">
      <button class="btn btn-resubmit" onclick="event.stopPropagation();openApprovalModal('${uid}','sm','resubmit')">↑ Resubmit</button>
    </div>` : '';
  // PDF badge/button shown inline in the meta row — no extra divider line
  const pdfInline = smSt==='Approved'
    ? (pdfSt==='Generated'
        ? `<div class="wf-meta"><div class="wf-ml">PDF</div><div class="wf-mv"><span class="wf-status-badge wfs-fulfilled" style="font-size:9.5px">📄 Generated ${r.pdfGeneratedAt?fmtD(r.pdfGeneratedAt.slice(0,10)):''}</span></div></div>`
        : (role==='IS'||role==='EXECUTIVE')
          ? `<div class="wf-meta" style="margin-top:2px"><div class="wf-ml">PDF</div><div class="wf-mv"><button class="btn btn-blue btn-sm" style="padding:3px 9px;font-size:10px" onclick="event.stopPropagation();generatePDF('${uid}')">📄 Generate PDF</button></div></div>`
          : `<div class="wf-meta"><div class="wf-ml">PDF</div><div class="wf-mv" style="font-size:10px;color:var(--amber);font-weight:600">⏳ Pending IS</div></div>`)
    : '';
  const pdfGenBtn = ''; // kept for compat — logic moved to pdfInline
  const panelP3 = `
    <div class="ph-panel open" data-phase="p3">
      <div class="wf-panel">
        <div class="wf-panel-hd">
          <span class="wf-phase-num" style="background:#7B1FA2">3</span>
          <span class="wf-panel-title">Sales Manager Approval</span>
          <span class="wf-status-badge ${smBadge}">${smSt||'Awaiting Review'}</span>
        </div>
        <div class="wf-panel-bd">
          ${r.smgrNotes?`<div class="wf-note${smSt===''?' resubmit':''}">${smSt==='Changes Requested'?'📝':'↑'} ${esc(r.smgrNotes)}</div>`:''}
          <div class="wf-meta-row">
            ${r.smgrApprovedBy?`<div class="wf-meta"><div class="wf-ml">${smSt==='Approved'?'Approved by':'Reviewed by'}</div><div class="wf-mv">${esc(r.smgrApprovedBy)}</div></div>`:''}
            ${r.smgrApprovedAt?`<div class="wf-meta"><div class="wf-ml">Date</div><div class="wf-mv">${fmtD(r.smgrApprovedAt.slice(0,10))}</div></div>`:''}
            ${pdfInline}
          </div>
          ${smActions}${smResubmit}
        </div>
      </div>
    </div>`;

  // ── Phase 3 continued — Store Approval ────────────────────────────────────
  const storeBadge = storeSt==='Approved'?'wfs-approved':storeSt==='Changes Requested'?'wfs-changes':'wfs-pending';
  const storeActions = !locked4 && canApproveStore && storeSt!=='Approved' ? `
    <div class="wf-actions">
      <button class="btn btn-approve" onclick="event.stopPropagation();openApprovalModal('${uid}','store','approve')">✓ Store Approved</button>
      <button class="btn btn-changes" onclick="event.stopPropagation();openApprovalModal('${uid}','store','changes')">✏ Store Requests Changes</button>
    </div>` : '';
  const panelP4 = `
    <div class="ph-panel" data-phase="p4">
      <div class="wf-panel" style="${locked4?'opacity:.55;pointer-events:none':''}">
        <div class="wf-panel-hd">
          <span class="wf-phase-num" style="background:var(--amber);color:var(--carbon)">3</span>
          <span class="wf-panel-title">Store Manager Approval</span>
          <span class="wf-status-badge ${locked4?'wfs-pending':storeBadge}">${locked4?'Locked — awaiting SM approval':(storeSt||'Awaiting Coordinator')}</span>
        </div>
        <div class="wf-panel-bd">
          ${storeSt==='Changes Requested'&&r.storeNotes?`<div class="wf-note">🏪 Store: ${esc(r.storeNotes)}</div>`:''}
          ${r.coordNotes?`<div class="wf-note" style="border-color:var(--green);background:var(--green-pale)">🤝 Coordinator: ${esc(r.coordNotes)}</div>`:''}
          <div class="wf-meta-row">
            ${r.storeUpdatedBy?`<div class="wf-meta"><div class="wf-ml">Logged by</div><div class="wf-mv">${esc(r.storeUpdatedBy)}</div></div>`:''}
            ${r.storeUpdatedAt?`<div class="wf-meta"><div class="wf-ml">Date</div><div class="wf-mv">${fmtD(r.storeUpdatedAt.slice(0,10))}</div></div>`:''}
          </div>
          ${storeActions}
        </div>
      </div>
    </div>`;

  // ── Phase 4 panel — Fulfillment & Dispatch ─────────────────────────────────
  const fulfBadge = fulfSt==='Actuals Logged'?'wfs-fulfilled':fulfSt==='Partial'?'wfs-partial':fulfSt==='Sent to WHS'?'wfs-sent':'wfs-pending';
  // 5A send to WHS button
  const sendBtn = !locked5 && canFulfill && !fulfSt ? `
    <div class="wf-actions">
      <button class="btn btn-fulfill" onclick="event.stopPropagation();markSentToWHS('${uid}')">📦 Mark as Sent to Warehouse</button>
    </div>` : '';
  const logActualsBtn = !locked5 && canFulfill && fulfSt==='Sent to WHS' ? `
    <div class="wf-actions" style="margin-top:4px">
      <button class="btn btn-fulfill" onclick="event.stopPropagation();markActualsLogged('${uid}')">📋 Confirm Actuals Received &amp; Logged</button>
    </div>` : '';
  // 5A meta
  const fulfMeta = fulfSt ? `
    <div class="wf-meta-row">
      ${r.sentToWhsBy?`<div class="wf-meta"><div class="wf-ml">Sent to WHS by</div><div class="wf-mv">${esc(r.sentToWhsBy)}</div></div>`:''}
      ${r.sentToWhsAt?`<div class="wf-meta"><div class="wf-ml">Sent Date</div><div class="wf-mv">${fmtD(r.sentToWhsAt.slice(0,10))}</div></div>`:''}
      ${r.boxes?`<div class="wf-meta"><div class="wf-ml">Ordered</div><div class="wf-mv">${esc(r.boxes)}</div></div>`:''}
      ${r.actualBoxes?`<div class="wf-meta"><div class="wf-ml">Actual Shipped</div><div class="wf-mv" style="${r.actualBoxes!==r.boxes?'color:var(--red);font-weight:700':'color:var(--teal);font-weight:700'}">${esc(r.actualBoxes)}</div></div>`:''}
      ${r.reasonCode?`<div class="wf-meta"><div class="wf-ml">Reason Code</div><div class="wf-mv" style="color:var(--red)">${esc(r.reasonCode)}</div></div>`:''}
      ${r.fulfillBy?`<div class="wf-meta"><div class="wf-ml">Logged by</div><div class="wf-mv">${esc(r.fulfillBy)}</div></div>`:''}
    </div>` : '';
  // 5B dispatch timeline — locked until actuals logged
  const dispatchBanner = !dispatchUnlocked && fulfSt ? `
    <div style="font-size:10.5px;color:#aaa;background:#F9F9F9;border:1px solid #EBEBEB;border-radius:6px;padding:6px 10px;display:flex;align-items:center;gap:5px">
      ⏸ <span>Dispatch tracking unlocks after warehouse actuals are logged.</span>
    </div>` : '';
  const dispatchSection = `
    <hr class="wf-divider" style="margin:6px 0 8px">
    ${dispatchBanner}
    <div style="${dispatchUnlocked?'':'opacity:.4;pointer-events:none'}">
      <div class="timeline" style="margin-bottom:8px">${tl}</div>
      <div class="det-meta" style="border-top:none;padding-top:0">
        ${r.boxes?`<div class="dm"><div class="dml">Boxes</div><div class="dmv">${esc(r.boxes)}</div></div>`:''}
        ${r.truck?`<div class="dm"><div class="dml">Truck</div><div class="dmv" style="font-family:'DM Mono',monospace">${esc(r.truck)}</div></div>`:''}
        ${r.cas?`<div class="dm"><div class="dml">CAS No.</div><div class="dmv" style="font-family:'DM Mono',monospace">${esc(r.cas)}</div></div>`:''}
        ${td!==null?`<div class="dm"><div class="dml">Transit</div><div class="dmv" style="${isOverdue(r)?'color:#C0392B;font-weight:700':''}">${td}d</div></div>`:''}
        ${r.remarks?`<div class="dm"><div class="dml">Remarks</div><div class="dmv">${esc(r.remarks)}</div></div>`:''}
      </div>
    </div>`;
  const panelP5 = `
    <div class="ph-panel open" data-phase="p5">
      <div class="wf-panel" style="${locked5?'opacity:.55;pointer-events:none':''}">
        <div class="wf-panel-hd">
          <span class="wf-phase-num" style="background:var(--teal)">4</span>
          <span class="wf-panel-title">Fulfillment &amp; Dispatch</span>
          <span class="wf-status-badge ${locked5?'wfs-pending':fulfBadge}">${locked5?'Locked — awaiting store approval':(fulfSt||'Not yet sent to warehouse')}</span>
        </div>
        <div class="wf-panel-bd">
          ${fulfMeta}${sendBtn}${logActualsBtn}
          ${dispatchSection}
        </div>
      </div>
    </div>`;

  // ── Actions row ───────────────────────────────────────────────────────────
  const actionsRow = `
    <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:8px;padding-top:8px;border-top:1px solid var(--silver)">
      ${canEdit?`<button class="btn btn-blue btn-sm" onclick="event.stopPropagation();openEditModal(this.dataset.uid)" data-uid="${uid}">✏ Edit</button>`:''}
      ${canDelete?`<button class="btn btn-outline btn-sm" style="color:var(--red);border-color:var(--red-mid)" onclick="event.stopPropagation();deleteRecord(this.dataset.uid)" data-uid="${uid}">✕ Delete</button>`:''}
    </div>`;

  // Progressive reveal — only show panels the CDF has actually reached
  const showP4 = smSt==='Approved' && pdfSt==='Generated'; // PDF must be generated before coordinator can act
  const showP5 = storeSt==='Approved';                     // Store approved → fulfillment begins

  return `<tr class="det-tr"><td colspan="12"><div class="det-inner">
    ${panelP3}
    ${showP4 ? panelP4 : ''}
    ${showP5 ? panelP5 : ''}
    ${actionsRow}
  </div></td></tr>`;
}

/* ══════════════════ ADD / EDIT MODAL ══════════════════ */
function buildForm(r) {
  const isEdit = !!r;
  const isNew  = !isEdit;
  r = r || {status:'Preparing Order', route:'Via SDC', type:'Regular', month:S.month};
  // Phase 6 date fields locked until warehouse actuals logged
  const p6Locked = isEdit && !['Actuals Logged','Partial'].includes(r.fulfillStatus||'');
  const p6Banner = isEdit && p6Locked ? `
    <div class="alert alert-info" style="margin-bottom:12px;font-size:11.5px">
      ⏸ <strong>Dispatch dates are locked</strong> — confirm actuals in Phase 4 to unlock.
    </div>` : '';
  return `${p6Banner}
    <div class="frow"><div class="fg">
      <label>CDF Reference <span class="req">*</span></label>
      <input type="text" id="f-cdf" value="${esc(r.cdf||'')}" placeholder="CDF3390-335">
    </div><div class="fg">
      <label>Store Name <span class="req">*</span></label>
      <input type="text" id="f-store" value="${esc(r.store||'')}" placeholder="BUHANGIN">
    </div></div>

    <div class="frow three"><div class="fg">
      <label>Month <span class="req">*</span></label>
      <select class="ms" id="f-month">
        ${MONTHS.map(m=>`<option value="${m}" ${(r.month||S.month)===m?'selected':''}>${m.charAt(0)+m.slice(1).toLowerCase()}</option>`).join('')}
      </select>
    </div><div class="fg">
      <label>Type ${isNew?'<span class="req">*</span>':''}</label>
      <select class="ms" id="f-type-m">
        ${!isEdit?'<option value="">— Select type —</option>':''}
        ${['Regular','Spare Parts','Shopee','Supplies'].map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div><div class="fg">
      <label>Route <span class="req">*</span></label>
      <select class="ms" id="f-route-m" onchange="updateRouteFields()">
        ${!isEdit?'<option value="">— Select route —</option>':''}
        ${['Direct','Via SDC','Via CDC'].map(v=>`<option value="${v}" ${r.route===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div></div>

    <div class="section-label">Dates</div>
    <div class="frow"><div class="fg">
      <label>WHS ${isNew?'<span class="req">*</span>':''}</label>
      <input type="date" id="f-dWhs" value="${r.dWhs||''}" oninput="syncDateLocks()" data-p6locked="${p6Locked}">
    </div><div class="fg">
      <label id="hub1-lbl">WHS → SDC</label>
      <input type="date" id="f-hub1" value="${r.dSdc||r.dDirect||''}" oninput="syncDateLocks()">
    </div></div>
    <div class="frow" id="hub2-row"><div class="fg" id="hub2-cell">
      <label id="hub2-lbl">SDC → Stores</label>
      <input type="date" id="f-hub2" value="${r.dSdc2||r.dCdc2||''}" oninput="syncDateLocks()">
    </div><div class="fg">
      <label>Received in Store</label>
      <input type="date" id="f-dRecv" value="${r.dRecv||''}">
    </div></div>

    <div class="section-label">Shipment Details</div>
    <div class="frow three"><div class="fg">
      <label>No. of Boxes</label>
      <input type="text" id="f-boxes" value="${esc(r.boxes||'')}" placeholder="12">
    </div><div class="fg">
      <label>Truck / Plate No.</label>
      <input type="text" id="f-truck" value="${esc(r.truck||'')}" placeholder="TRK-001">
    </div><div class="fg">
      <label>CAS No.</label>
      <input type="text" id="f-cas" value="${esc(r.cas||'')}" placeholder="169070">
    </div></div>

    <div class="frow full"><div class="fg">
      <label>Remarks</label>
      <textarea id="f-remarks" placeholder="e.g. 12 + 1 Curtain Rods bundle, partial delivery…">${esc(r.remarks||'')}</textarea>
    </div></div>

    ${(S.user.role==='EXECUTIVE'||S.user.role==='IS') ? `
    <div class="frow full"><div class="fg" style="flex-direction:row;align-items:center;gap:10px;padding:10px 0 2px">
      <input type="checkbox" id="f-onhold" style="width:16px;height:16px;accent-color:var(--grey);cursor:pointer;flex-shrink:0" ${r.status==='On Hold'?'checked':''}>
      <label for="f-onhold" style="text-transform:none;font-size:12.5px;font-weight:600;color:var(--carbon);cursor:pointer;letter-spacing:0">
        Put on Hold <span style="font-size:10px;color:#999;font-weight:400">— overrides status until unchecked</span>
      </label>
    </div></div>` : ''}
  `;
}

function syncDateLocks() {
  const route  = document.getElementById('f-route-m')?.value || 'Via SDC';
  const dWhs   = document.getElementById('f-dWhs')?.value  || '';
  const hub1   = document.getElementById('f-hub1')?.value  || '';
  const hub2El = document.getElementById('f-hub2');
  const h2cell = document.getElementById('hub2-cell');
  const hub2Visible = h2cell && h2cell.style.display !== 'none';

  // Phase 4 gate: dispatch dates locked until actuals are confirmed
  const p6Locked = document.getElementById('f-dWhs')?.dataset.p6locked === 'true';

  const fDWhs = document.getElementById('f-dWhs');
  if (fDWhs) fDWhs.disabled = p6Locked;

  const fHub1 = document.getElementById('f-hub1');
  if (fHub1) {
    fHub1.disabled = p6Locked || !dWhs;
    if (dWhs) fHub1.min = dWhs; // hub1 must be on or after WHS date
  }

  if (hub2El && hub2Visible) {
    hub2El.disabled = p6Locked || !hub1;
    if (hub1) hub2El.min = hub1; // hub2 must be on or after hub1
  }

  const fRecv = document.getElementById('f-dRecv');
  if (fRecv) {
    if (p6Locked) {
      fRecv.disabled = true;
    } else if (route === 'Direct') {
      fRecv.disabled = !hub1;
      if (hub1) fRecv.min = hub1;
    } else {
      const hub2val = hub2El?.value || '';
      fRecv.disabled = !hub2val;
      if (hub2val) fRecv.min = hub2val;
    }
  }
}

function updateRouteFields() {
  const route = document.getElementById('f-route-m')?.value||'Via SDC';
  const h1lbl = document.getElementById('hub1-lbl');
  const h2lbl = document.getElementById('hub2-lbl');
  const h2row = document.getElementById('hub2-row');
  const h2cell = document.getElementById('hub2-cell');
  if(route==='Direct'){
    if(h1lbl) h1lbl.textContent='WHS → Store (Direct)';
    if(h2lbl) h2lbl.textContent='Received in Store';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='none';
  } else if(route==='Via SDC'){
    if(h1lbl) h1lbl.textContent='WHS → SDC';
    if(h2lbl) h2lbl.textContent='SDC → Stores';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='';
  } else if(route==='Via CDC'){
    if(h1lbl) h1lbl.textContent='WHS → CDC';
    if(h2lbl) h2lbl.textContent='CDC → Stores';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='';
  }
  syncDateLocks();
}

function getFormVals() {
  const route  = document.getElementById('f-route-m').value;
  const isDirect = route==='Direct';
  const isSdc    = route==='Via SDC';
  const isCdc    = route==='Via CDC';
  const hub1  = document.getElementById('f-hub1').value;
  const hub2  = document.getElementById('f-hub2').value;
  return {
    cdf:     document.getElementById('f-cdf').value.trim(),
    store:   document.getElementById('f-store').value.trim().toUpperCase(),
    month:   document.getElementById('f-month').value,
    type:    document.getElementById('f-type-m').value,
    route,
    status: (function(){
      const onHold = document.getElementById('f-onhold')?.checked;
      if (onHold) return 'On Hold';
      // Dispatch status only applies in Phase 4 after actuals confirmed.
      const editingRec = S.editingId ? S.records.find(r=>(r.id||r.cdf)===S.editingId) : null;
      const dispatchActive = editingRec && ['Actuals Logged','Partial'].includes(editingRec.fulfillStatus||'');
      if (!dispatchActive) return editingRec?.status || 'Preparing Order';
      const dRecv = document.getElementById('f-dRecv').value;
      const hub1v = document.getElementById('f-hub1').value;
      const hub2v = document.getElementById('f-hub2').value;
      const dWhs  = document.getElementById('f-dWhs').value;
      if (dRecv) return 'Received';
      if (route === 'Direct') {
        if (hub1v) return 'In Transit';
        if (dWhs)  return 'Preparing Order';
      } else if (route === 'Via SDC') {
        if (hub2v) return 'In Transit';
        if (hub1v) return 'Pending Dispatch';
        if (dWhs)  return 'Preparing Order';
      } else if (route === 'Via CDC') {
        if (hub2v) return 'In Transit';
        if (hub1v) return 'Pending Dispatch';
        if (dWhs)  return 'Preparing Order';
      }
      return 'Preparing Order';
    })(),
    dWhs:    document.getElementById('f-dWhs').value,
    dSdc:    isSdc  ? hub1 : '',
    dDirect: isDirect?hub1 : '',
    dCdc:    isCdc  ? hub1 : '',
    dSdc2:   isSdc  ? hub2 : '',
    dCdc2:   isCdc  ? hub2 : '',
    dRecv:   document.getElementById('f-dRecv').value,
    boxes:   document.getElementById('f-boxes').value.trim(),
    truck:   document.getElementById('f-truck').value.trim(),
    cas:     document.getElementById('f-cas').value.trim(),
    remarks: document.getElementById('f-remarks').value.trim()
  };
}

function openAddModal() {
  S.editingId = null;
  document.getElementById('mo-title').textContent = 'Add CDF Entry';
  document.getElementById('mo-body').innerHTML = buildForm(null);
  document.getElementById('mo-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveRecord()">Save Entry</button>`;
  document.getElementById('mo').style.display='flex';
  updateRouteFields();
  setTimeout(()=>document.getElementById('f-cdf').focus(),50);
}

function openEditModal(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;
  S.editingId = uid;
  document.getElementById('mo-title').textContent = 'Edit — ' + r.cdf;
  document.getElementById('mo-body').innerHTML = buildForm(r);
  document.getElementById('mo-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveRecord()">Save Changes</button>`;
  document.getElementById('mo').style.display='flex';
  updateRouteFields();
}

function closeModal() {
  document.getElementById('mo').style.display='none';
  S.editingId = null;
}

/* ══════════════════ APPROVAL MODAL (Phase 3) ══════════════════ */
function openApprovalModal(uid, phase, action) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;

  const isSM = phase==='sm';
  const isResubmit = action==='resubmit';
  const isChanges = action==='changes';

  const titles = {
    sm: { approve:'Approve Order — Sales Manager', changes:'Request Changes — Sales Manager', resubmit:'Resubmit to Sales Manager' },
    store: { approve:'Confirm Store Approval', changes:'Log Store Change Request' }
  };

  document.getElementById('mo-title').textContent = titles[phase][action];

  let body = '';
  if(isResubmit) {
    body = `
      <div class="fg"><label>Resubmit Note <span style="color:#aaa;font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="wf-note" placeholder="Note to Sales Manager about what was revised…"></textarea>
      </div>`;
  } else if(isChanges) {
    const lbl = isSM ? 'Changes Required' : 'Store Manager Notes';
    const ph = isSM ? 'Describe what needs to be revised…' : "Log the store manager's reason for changes…";
    const coordLbl = !isSM ? `
      <div class="fg" style="margin-top:10px"><label>Coordinator Notes <span style="color:#aaa;font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="wf-coord-note" placeholder="Your notes on this interaction…"></textarea>
      </div>` : '';
    body = `
      <div class="fg"><label>${lbl} <span class="req">*</span></label>
        <textarea id="wf-note" placeholder="${ph}"></textarea>
      </div>${coordLbl}`;
  } else {
    // approve
    const coordLbl = !isSM ? `
      <div class="fg" style="margin-top:10px"><label>Coordinator Notes <span style="color:#aaa;font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="wf-coord-note" placeholder="Notes on this store approval…"></textarea>
      </div>` : '';
    body = `
      <div class="alert alert-info" style="margin-bottom:0">
        ${isSM ? '👔 You are approving this order as Sales Manager. CDF generation will be unlocked.' : '🤝 You are confirming the store manager approved this CDF.'}
      </div>${coordLbl}`;
  }

  document.getElementById('mo-body').innerHTML = `<div style="padding:4px 0">${body}</div>`;
  document.getElementById('mo-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn ${action==='approve'?'btn-primary':action==='resubmit'?'btn-resubmit':'btn-changes'}" onclick="saveApproval('${uid}','${phase}','${action}')">
      ${action==='approve'?'✓ Confirm Approval':action==='resubmit'?'↑ Resubmit':'Save'}
    </button>`;
  document.getElementById('mo').style.display='flex';
}

async function saveApproval(uid, phase, action) {
  const noteEl = document.getElementById('wf-note');
  const coordEl = document.getElementById('wf-coord-note');
  const note = noteEl?.value.trim()||'';
  const coordNote = coordEl?.value.trim()||'';

  if((action==='changes') && !note) { toast('Please enter a reason for the change request','err'); return; }

  const now = new Date().toISOString();
  const user = S.user.username;
  let patch = {};

  if(phase==='sm') {
    if(action==='approve') patch = {smgrStatus:'Approved', smgrNotes:'', smgrApprovedBy:user, smgrApprovedAt:now};
    else if(action==='changes') patch = {smgrStatus:'Changes Requested', smgrNotes:note, smgrApprovedBy:user, smgrApprovedAt:now};
    else if(action==='resubmit') patch = {smgrStatus:'', smgrNotes:note||'Revised and resubmitted', smgrApprovedBy:'', smgrApprovedAt:''};
  } else {
    if(action==='approve') patch = {storeStatus:'Approved', storeNotes:'', storeUpdatedBy:user, storeUpdatedAt:now, coordNotes:coordNote||r_coordNote(uid)};
    else if(action==='changes') patch = {storeStatus:'Changes Requested', storeNotes:note, storeUpdatedBy:user, storeUpdatedAt:now, coordNotes:coordNote||r_coordNote(uid)};
  }

  await apiUpdateCDF(uid, patch);
  closeModal();
  // Keep the row expanded so user sees the updated panel
  S.expandedId = uid;
  renderAll();
  toast(action==='approve'?'Approval recorded':action==='resubmit'?'Resubmitted':'Change request logged');
}

function r_coordNote(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  return r?.coordNotes||'';
}

/* ══════════════════ GENERATE PDF (Phase 3 — IS only) ══════════════════ */
async function generatePDF(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;
  if(r.pdfStatus==='Generated') {
    const again = confirm(`⚠️ A PDF was already generated for this CDF on ${r.pdfGeneratedAt?fmtD(r.pdfGeneratedAt.slice(0,10)):'an earlier date'} by ${r.pdfGeneratedBy||'IS'}.\n\nAre you sure you want to mark it as generated again? Only do this if you re-ran the script and uploaded a new version to Drive.`);
    if(!again) return;
  } else {
    if(!confirm('Mark this CDF as "PDF Generated"?\n\nMake sure you have already run the Python script and uploaded the PDF to the shared Drive folder before confirming.')) return;
  }
  const patch = {
    pdfStatus: 'Generated',
    pdfGeneratedBy: S.user.username,
    pdfGeneratedAt: new Date().toISOString()
  };
  await apiUpdateCDF(uid, patch);
  S.expandedId = uid;
  renderAll();
  toast('PDF status marked as Generated');
}

/* ══════════════════ MARK SENT TO WAREHOUSE (Phase 4 — IS only) ══════════════════ */
async function markSentToWHS(uid) {
  if(!confirm('Confirm that the finalized order has been sent to the Warehouse team?')) return;
  const patch = {
    fulfillStatus: 'Sent to WHS',
    sentToWhsBy: S.user.username,
    sentToWhsAt: new Date().toISOString()
  };
  await apiUpdateCDF(uid, patch);
  S.expandedId = uid;
  renderAll();
  toast('Order marked as Sent to Warehouse');
}

/* ══════════════════ CONFIRM ACTUALS LOGGED (Phase 4 — IS only) ══════════════════ */
async function markActualsLogged(uid) {
  if(!confirm('Confirm that warehouse actuals have been received and logged?\n\nThis will move the CDF to Pending Dispatch.')) return;
  const patch = {
    fulfillStatus: 'Actuals Logged',
    status: 'Pending Dispatch',
    fulfillBy: S.user.username,
    fulfillAt: new Date().toISOString()
  };
  await apiUpdateCDF(uid, patch);
  S.expandedId = uid;
  renderAll();
  toast('Actuals logged — CDF moved to Pending Dispatch');
}

/* ══════════════════ FULFILLMENT MODAL (Phase 4) ══════════════════ */
async function saveRecord() {
  const vals = getFormVals();
  const isNew = !S.editingId;

  if(!vals.cdf)   { toast('CDF Reference is required','err'); return; }
  if(!vals.store) { toast('Store Name is required','err'); return; }

  // Additional fields required on initial entry
  if(isNew) {
    if(!vals.type)  { toast('Type is required','err'); return; }
    if(!vals.route || vals.route==='Unknown') { toast('Route is required','err'); return; }
    if(!vals.dWhs)  { toast('WHS date is required','err'); return; }
  }
  // Date sequence validation — always enforced on edit and add
  const d = (v) => v ? new Date(v) : null;
  const dWhs  = d(vals.dWhs);
  const dHub1 = d(vals.dSdc||vals.dDirect||vals.dCdc);
  const dHub2 = d(vals.dSdc2||vals.dCdc2);
  const dRecv = d(vals.dRecv);
  if(dWhs && dHub1 && dHub1 < dWhs) { toast('WHS → Hub date cannot be before WHS date','err'); return; }
  if(dHub1 && dHub2 && dHub2 < dHub1) { toast('Hub → Store date cannot be before WHS → Hub date','err'); return; }
  if(dHub2 && dRecv && dRecv < dHub2) { toast('Received date cannot be before Hub → Store date','err'); return; }
  if(!dHub2 && dHub1 && dRecv && dRecv < dHub1) { toast('Received date cannot be before dispatch date','err'); return; }

  const btn = document.querySelector('#mo-footer .btn-primary');
  btn.innerHTML='<div class="spinner"></div> Saving…'; btn.disabled=true;

  try {
    const wasEditing = !!S.editingId;
    const editedId   = S.editingId;
    if(wasEditing) {
      await apiUpdateCDF(editedId, vals);
      closeModal();
      S.expandedId = editedId; // keep row open to see changes
    } else {
      await apiAddCDF(vals);
      closeModal();
      S.expandedId = null;
    }
    renderAll();
    toast(wasEditing ? 'Record updated' : 'CDF added');
  } catch(e) {
    toast(e.message, 'err');
    btn.innerHTML='Save'; btn.disabled=false;
  }
}

/* ══════════════════ API CRUD ══════════════════ */
async function apiAddCDF(vals) {
  const tempId = 'local-'+Date.now();
  const now = new Date().toISOString();
  const user = S.user.username;
  // Until the full workflow engine is built, new CDFs skip Phases 3 & 4
  // and land directly in Phase 4 — WHS Prepare Order
  const workflowDefaults = {
    smgrStatus:     'Approved',
    smgrApprovedBy: user,
    smgrApprovedAt: now,
    smgrNotes:      '',
    pdfStatus:      'Generated',
    pdfGeneratedBy: user,
    pdfGeneratedAt: now,
    storeStatus:    'Approved',
    storeUpdatedBy: user,
    storeUpdatedAt: now,
    storeNotes:     '',
    coordNotes:     '',
    fulfillStatus:  '',
  };
  const rec = {...vals, ...workflowDefaults, id:tempId, createdBy:user,
               createdAt:now, updatedAt:now};
  S.records.unshift(rec);
  // Update wfCache so poll doesn't wipe these defaults
  if(!S._wfCache) S._wfCache = {};
  S._wfCache[tempId] = {...workflowDefaults};

  if(!CFG.offline && CFG.apiUrl) {
    try {
      const saved = await gasPost('addCDF', {...vals, ...workflowDefaults, username:user});
      const idx = S.records.findIndex(r=>r.id===tempId);
      if(idx>=0) {
        S.records[idx]=saved;
        S._wfCache[saved.id||saved.cdf] = {...workflowDefaults};
        delete S._wfCache[tempId];
      }
      renderAll();
    } catch(e) { toast('Saved locally — sync failed: '+e.message,'warn'); }
  }
}

async function apiUpdateCDF(uid, vals) {
  const idx = S.records.findIndex(r=>(r.id||r.cdf)===uid);
  if(idx>=0) S.records[idx]={...S.records[idx],...vals,updatedBy:S.user.username,updatedAt:new Date().toISOString()};

  // Keep workflow cache in sync so loadData merges don't wipe these fields
  if(!S._wfCache) S._wfCache = {};
  if(!S._wfCache[uid]) S._wfCache[uid] = {};
  Object.assign(S._wfCache[uid], vals);

  if(!CFG.offline && CFG.apiUrl) {
    try {
      const id = S.records[idx]?.id||uid;
      await gasPost('updateCDF', {...vals, id, username:S.user.username});
    } catch(e) { toast('Saved locally — sync failed: '+e.message,'warn'); }
  }
}

async function deleteRecord(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;
  if(!confirm(`Delete ${r.cdf} — ${r.store}?`)) return;
  S.records = S.records.filter(x=>(x.id||x.cdf)!==uid);
  S.expandedId = null;
  renderAll();
  toast('Record deleted','warn');

  if(!CFG.offline && CFG.apiUrl) {
    try { await gasPost('deleteCDF',{id:r.id||uid, username:S.user.username}); }
    catch(e) { toast('Delete sync failed: '+e.message,'warn'); }
  }
}

/* ══════════════════ GAS HTTP ══════════════════ */
async function gasPost(action, payload) {
  // Apps Script doesn't handle CORS preflight on POST with application/json.
  // Solution: send everything as GET with payload encoded as a query param.
  const url = new URL(CFG.apiUrl);
  url.searchParams.set('action', action);
  url.searchParams.set('payload', JSON.stringify(payload));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if(!data.ok) throw new Error(data.error||'API error');
  return data.data;
}

async function gasGet(action, params={}) {
  const url = new URL(CFG.apiUrl);
  url.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if(!data.ok) throw new Error(data.error||'API error');
  return data.data;
}

/* ══════════════════ EXPORT ══════════════════ */
function exportCSV() {
  const rows = getFiltered();
  const h=['Month','CDF Ref','Store','Type','Route','Status','WHS','WHS→Hub','Hub→Store','Received','Transit Days','Truck','Boxes','CAS No','Remarks'];
  const lines=[h.join(',')];
  rows.forEach(r=>{
    const td=tdDays(r);
    const h1=r.dSdc||r.dCdc||r.dDirect||'';
    const h2=r.dSdc2||r.dCdc2||'';
    lines.push([r.month,r.cdf,r.store,r.type,r.route,r.status,r.dWhs,h1,h2,r.dRecv,td??'',r.truck,r.boxes,r.cas,r.remarks]
      .map(v=>{const s=String(v||'');return s.includes(',')||s.includes('"')?`"${s.replace(/"/g,'""')}"`  :s}).join(','));
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=`acacia-dispatch-${S.month.toLowerCase()}.csv`;
  a.click();
  toast('CSV exported');
}

/* ══════════════════ UTILS ══════════════════ */
function isOverdue(r) {
  if(r.status!=='In Transit'&&r.status!=='Pending Dispatch'&&r.status!=='Preparing Order') return false;
  if(!r.dWhs) return false;
  return (Date.now()-new Date(r.dWhs))/ 86400000 > (parseInt(document.getElementById('dd')?.value)||7);
}

function tdDays(r) {
  if(!r.dWhs) return null;
  const s=new Date(r.dWhs), e=r.dRecv?new Date(r.dRecv):new Date();
  const d=Math.round((e-s)/86400000);
  return d>=0?d:null;
}

function fmtD(s) {
  if(!s || s==='—') return '—';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Handle YYYY-MM-DD
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return months[parseInt(iso[2])-1]+' '+parseInt(iso[3])+', '+iso[1];
  // Handle full Date string from Google Sheets (e.g. "Fri Apr 24 2026 00:00:00 GMT+0800...")
  const d = new Date(s);
  if(!isNaN(d)) {
    const hr = d.getHours(), mn = d.getMinutes();
    const t = hr===0&&mn===0 ? '' :
      ` ${hr%12||12}:${String(mn).padStart(2,'0')}${hr<12?'AM':'PM'}`;
    return months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+t;
  }
  return s; // fallback: show as-is
}

function fmtTime(d) {
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg,type='ok') {
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${{ok:'✅',err:'❌',warn:'⚠️'}[type]||''}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function setConn(state, label) {
  const dot=document.getElementById('conn-dot');
  const lbl=document.getElementById('conn-lbl');
  if(dot){dot.className='conn-dot '+state;}
  if(lbl) lbl.textContent=label;
  const si=document.getElementById('sync-info');
  if(si) si.innerHTML=state==='syncing'?'<div class="spinner"></div> Syncing…':'';
}
