<!-- v2 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22A749">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Acacia HBC — Dispatching & Receiving</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#22A749;--green-pale:#EBF7EF;--green-mid:#b8dfc4;
  --blue:#1B4DA0;--blue-pale:#EBF0FA;--blue-mid:#b3c6f0;
  --carbon:#2C2C2C;--silver:#DDDDDD;--mist:#F5F5F5;--white:#FFFFFF;
  --amber:#F9A825;--amber-pale:#FFF8E1;
  --red:#C0392B;--red-pale:#FEEEEC;--red-mid:#f5b3aa;
  --teal:#00695C;--teal-pale:#E0F2F1;
  --grey:#78909C;--grey-pale:#ECEFF1;
  --r:6px;--rl:10px;--sh:0 1px 4px rgba(0,0,0,.08);--shm:0 4px 16px rgba(0,0,0,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"DM Sans",sans-serif;background:var(--mist);color:var(--carbon);font-size:13px;line-height:1.5}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#EBF7EF 0%,#EBF0FA 50%,#F5F5F5 100%);display:flex;align-items:center;justify-content:center;z-index:900}
.login-box{background:var(--white);border:1px solid #E8E8E8;border-radius:16px;padding:40px 44px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06)}
.login-logo{text-align:center;margin-bottom:24px}
.login-a{font-family:"Montserrat",sans-serif;font-weight:800;font-size:22px;color:var(--green);letter-spacing:3px}
.login-b{font-family:"Montserrat",sans-serif;font-weight:600;font-size:9px;letter-spacing:2px;text-transform:uppercase;background:var(--blue);color:#fff;padding:2px 8px;display:inline-block;margin-top:2px}
.login-title{font-family:"Montserrat",sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;text-align:center;color:#888;margin-bottom:22px}
.offline-note{font-size:11px;color:#aaa;text-align:center;margin-top:12px}
.offline-note a{color:var(--blue);cursor:pointer;text-decoration:underline}

/* ── HEADER ── */
header{background:var(--white);border-bottom:3px solid var(--green);box-shadow:var(--sh);position:sticky;top:0;z-index:200}
.hi{max-width:1400px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:9px}
.la{font-family:"Montserrat",sans-serif;font-weight:800;font-size:15px;color:var(--green);letter-spacing:2px}
.lb{font-family:"Montserrat",sans-serif;font-weight:600;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;background:var(--blue);color:#fff;padding:1px 5px;display:inline-block}
.hdiv{width:1px;height:26px;background:var(--silver)}
.htitle{font-family:"Montserrat",sans-serif;font-weight:700;font-size:13px}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--grey);flex-shrink:0}
.conn-dot.online{background:var(--green)}
.conn-dot.offline{background:var(--red)}
.conn-dot.syncing{background:var(--amber)}
.user-chip{display:flex;align-items:center;gap:7px;font-size:12px;padding:4px 10px;background:var(--mist);border:1px solid var(--silver);border-radius:20px}
.user-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}

/* ── MAIN ── */
main{max-width:1400px;margin:0 auto;padding:18px 24px 48px}

/* ── CONTROLS ── */
.controls{background:var(--white);border:1px solid var(--silver);border-radius:var(--rl);padding:13px 16px;margin-bottom:14px;box-shadow:var(--sh)}
.crow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.mtabs{display:flex;gap:3px}
.mtab{font-family:"Montserrat",sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1.5px solid var(--silver);background:var(--white);color:#888;cursor:pointer;transition:all .13s}
.mtab:hover{border-color:#aaa;color:var(--carbon)}
.mtab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.sep{width:1px;height:22px;background:var(--silver);margin:0 2px}
.sw{position:relative;flex:1;min-width:180px;max-width:260px}
.sw input{width:100%;background:#FAFAFA;border:1.5px solid #E8E8E8;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12.5px;padding:7px 10px 7px 30px;outline:none;transition:border-color .18s,background .18s,box-shadow .18s}
.sw input:focus{border-color:var(--green);background:var(--white);box-shadow:0 0 0 3px rgba(34,167,73,.10)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#bbb;font-size:12px;pointer-events:none}
select.fs{background:#FAFAFA;border:1.5px solid #E8E8E8;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12.5px;padding:7px 10px;outline:none;cursor:pointer;color:var(--carbon);transition:border-color .18s,background .18s}
select.fs:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(34,167,73,.10)}
.dw{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.dw input{width:44px;padding:5px 7px;border:1px solid var(--silver);border-radius:var(--r);font-size:12px;text-align:center;outline:none}
.dw input:focus{border-color:var(--amber)}
.rc{font-size:11.5px;color:#999;white-space:nowrap}
.sync-info{font-size:10.5px;color:#bbb;display:flex;align-items:center;gap:5px}

/* ── SUMMARY ── */
.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--white);border:1px solid var(--silver);border-radius:var(--rl);padding:12px 14px;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;overflow:hidden}
.sc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.sc.c-recv::before{background:var(--green)}
.sc.c-tr::before{background:var(--blue)}.sc.c-pd::before{background:var(--amber)}.sc.c-prep::before{background:#9C27B0}
.sc.c-hold::before{background:var(--grey)}.sc.c-done::before{background:var(--teal)}.sc.c-attn::before{background:var(--red)}.sc.c-attn .sn{color:var(--red)}.sc.c-attn.active{border-color:var(--red);background:var(--red-pale)}
.sc:hover{box-shadow:var(--shm)}.sc.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green-mid)}
.sn{font-family:"Montserrat",sans-serif;font-weight:800;font-size:24px;line-height:1;color:var(--carbon)}
.sl{font-size:10.5px;color:#888;margin-top:3px;font-weight:500}
.sd{font-size:10px;margin-top:5px;font-weight:600}

/* ── TABLE CARD ── */
.tcard{background:var(--white);border:1px solid var(--silver);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
.tcard-header{padding:11px 16px;border-bottom:1px solid var(--silver);display:flex;align-items:center;gap:10px;background:var(--mist)}
.tcard-title{font-family:"Montserrat",sans-serif;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#888}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:980px}
thead th{font-family:"Montserrat",sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;padding:9px 12px;text-align:left;border-bottom:2px solid var(--silver);background:var(--mist);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--blue)}
thead th.sorted{color:var(--blue)}
tbody tr{border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f6faff}
tbody tr.overdue-row{background:#fff9f7}
tbody tr.overdue-row:hover{background:#fff2ee}
tbody tr.exp-row{background:var(--blue-pale)}
td{padding:9px 12px;vertical-align:middle}
.td-cdf{font-family:"DM Mono",monospace;font-size:11.5px;font-weight:500;color:var(--blue)}
.td-store{font-weight:600;font-size:12.5px}
.td-date{font-size:11.5px;color:#555;white-space:nowrap}
.td-date.empty{color:#ccc;font-style:italic}
.td-dim{font-size:11.5px;color:#777}

/* ── BADGES ── */
.sb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
.sb .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-received{background:var(--green-pale);color:#1a7a38;border-color:var(--green-mid)}
.s-transit{background:var(--blue-pale);color:var(--blue);border-color:var(--blue-mid)}
.s-pending{background:var(--amber-pale);color:#9a6700;border-color:#f5d87a}
.s-preparing{background:#F3E5F5;color:#6A1B9A;border-color:#CE93D8}
.s-hold{background:var(--grey-pale);color:#546E7A;border-color:#b0bec5}
.s-completed{background:var(--teal-pale);color:var(--teal);border-color:#80cbc4}
.rb{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase}
.r-direct{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.r-sdc{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9}
.r-cdc{background:#F3E5F5;color:#6A1B9A;border:1px solid #CE93D8}
.r-unknown{background:#F5F5F5;color:#757575;border:1px solid #E0E0E0}
.tb{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px}
.t-regular{background:#EEE;color:#555}
.t-sp{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.t-shopee{background:#FFF0F5;color:#C2185B;border:1px solid #F48FB1}
.t-supplies{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.od-flag{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;color:var(--red);background:var(--red-pale);border:1px solid var(--red-mid);padding:2px 6px;border-radius:3px;margin-left:4px}

/* ── DETAIL EXPAND ── */
.det-tr td{padding:0!important;background:var(--blue-pale);border-bottom:1px solid var(--blue-mid)!important}
.det-inner{padding:14px 18px 16px}
.timeline{display:flex;align-items:flex-start;gap:0;margin-bottom:16px;overflow-x:auto;padding:22px 0 8px}
.ts{display:flex;flex-direction:column;align-items:center;min-width:120px;flex:1;position:relative}
.ts:not(:last-child)::after{content:"";position:absolute;top:22px;left:50%;width:100%;height:3px;background:var(--silver);z-index:0;border-radius:2px}
.ts.done::after{background:var(--green)}
.ts.active::after{background:linear-gradient(to right,var(--green) 40%,var(--silver))}
.ts.active-pending::after{background:linear-gradient(to right,var(--amber) 40%,var(--silver))}
/* Icon circle */
.tc{width:44px;height:44px;border-radius:50%;border:2.5px solid var(--silver);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;z-index:1;flex-shrink:0;transition:all .2s}
.ts.done .tc{border-color:var(--green);background:var(--green-pale);box-shadow:0 0 0 4px #22a74920}
.ts.active .tc{border-color:var(--blue);background:var(--blue-pale);box-shadow:0 0 0 5px #1b4da025,0 0 0 9px #1b4da010;animation:pulse-ring 2s ease-out infinite}
.ts.active-pending .tc{border-color:var(--amber);background:var(--amber-pale);opacity:.75}
.ts.pending .tc{opacity:.3;filter:grayscale(1)}
@keyframes pulse-ring{0%{box-shadow:0 0 0 4px #1b4da030,0 0 0 8px #1b4da015}70%{box-shadow:0 0 0 8px #1b4da010,0 0 0 14px #1b4da005}100%{box-shadow:0 0 0 4px #1b4da030,0 0 0 8px #1b4da015}}
/* Labels */
.tl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-top:8px;text-align:center;color:#999}
.ts.done .tl{color:var(--green)}
.ts.active .tl{color:var(--blue);font-size:9.5px}
.ts.active-pending .tl{color:#9a6700;font-size:9px}
.ts.pending .tl{color:#bbb}
/* Date */
.td2{font-family:"DM Mono",monospace;font-size:10.5px;margin-top:3px;text-align:center;color:#aaa}
.ts.done .td2{color:var(--carbon);font-weight:500}
.ts.active .td2{color:var(--blue);font-weight:600}
.ts.active-pending .td2{color:#aaa}
.ts.active::before{content:"NOW";position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;letter-spacing:1px;color:var(--white);background:var(--blue);padding:2px 6px;border-radius:10px;z-index:2}
.ts.active-pending::before{content:"NEXT";position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;letter-spacing:1px;color:var(--white);background:var(--amber);padding:2px 6px;border-radius:10px;z-index:2}
.det-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;padding-top:10px;border-top:1px solid var(--blue-mid)}
.dm{display:flex;flex-direction:column;gap:1px}
.dml{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#999;font-weight:700}
.dmv{font-weight:500;color:var(--carbon)}
.det-actions{display:flex;gap:7px;margin-left:auto;align-items:flex-start}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(30,30,30,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--white);border-radius:var(--rl);width:100%;max-width:580px;box-shadow:var(--shm);animation:mIn .18s ease;border:1px solid var(--silver)}
@keyframes mIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:none}}
.mh{padding:15px 20px;border-bottom:1px solid var(--silver);display:flex;align-items:center;gap:10px}
.mt{font-family:"Montserrat",sans-serif;font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.5px}
.mc{margin-left:auto;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;line-height:1;padding:0 2px;transition:color .1s}
.mc:hover{color:var(--carbon)}
.mb{padding:18px 20px;max-height:70vh;overflow-y:auto}
.mf{padding:13px 20px;border-top:1px solid var(--silver);display:flex;gap:8px;justify-content:flex-end;background:var(--mist);border-radius:0 0 var(--rl) var(--rl)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.full{grid-template-columns:1fr}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999}
label .req{color:var(--red);margin-left:2px}
/* ── FIELD BASE ── */
input[type=text],input[type=date],input[type=password],select.ms,textarea{
  width:100%;background:#FAFAFA;border:1.5px solid #E8E8E8;border-radius:8px;
  font-family:"DM Sans",sans-serif;font-size:13px;padding:10px 13px;
  outline:none;transition:border-color .18s,background .18s,box-shadow .18s;
  color:var(--carbon);line-height:1.4;
}
input[type=text]:hover,input[type=date]:hover,input[type=password]:hover,select.ms:hover,textarea:hover{
  border-color:#C8C8C8;background:#fff;
}
input:focus,select.ms:focus,textarea:focus{
  border-color:var(--green);background:#fff;
  box-shadow:0 0 0 3px rgba(34,167,73,.12);
}
input[type=date]:disabled{background:var(--mist);color:#bbb;cursor:not-allowed;border-color:#eee;box-shadow:none}
textarea{resize:vertical;min-height:62px}
input::placeholder,textarea::placeholder{color:#C0C0C0;font-size:12.5px}

/* ── LOGIN FIELDS ── */
.login-field-wrap{position:relative;margin-bottom:14px}
.login-field-wrap .lf-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:14px;color:#C0C0C0;pointer-events:none;transition:color .18s;
}
.login-field-wrap input{
  padding-left:40px;padding-top:13px;padding-bottom:13px;
  font-size:13.5px;border-radius:10px;
  background:#F7F8FA;border:1.5px solid #E4E6EA;
}
.login-field-wrap input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(34,167,73,.13)}
.login-field-wrap input:focus ~ .lf-icon{color:var(--green)}
.status-opts{display:flex;gap:6px;flex-wrap:wrap}
.sopt-in{display:none}
.sopt-lb{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:all .12s;user-select:none}
.sopt-in:checked+.sopt-lb{box-shadow:0 0 0 2px currentColor}
.section-label{font-family:"Montserrat",sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;padding:6px 0 4px;border-top:1px solid var(--silver);margin-top:4px}

/* ── FORMS ── */
.btn{display:inline-flex;align-items:center;gap:5px;font-family:"DM Sans",sans-serif;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:var(--r);border:none;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:#1a8038}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#133a7a}
.btn-outline{background:var(--white);color:var(--carbon);border:1px solid var(--silver)}.btn-outline:hover{border-color:#aaa;background:var(--mist)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#a93226}
.btn-sm{font-size:11.5px;padding:5px 10px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── ALERTS / TOAST ── */
.alert{border-radius:var(--r);padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-err{background:var(--red-pale);border:1px solid var(--red-mid);color:var(--red)}
.alert-info{background:var(--blue-pale);border:1px solid var(--blue-mid);color:var(--blue)}
#toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--white);border:1px solid var(--silver);border-radius:var(--r);box-shadow:var(--shm);padding:9px 14px;font-size:12.5px;display:flex;align-items:center;gap:7px;min-width:220px;animation:tIn .2s ease}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}.toast.warn{border-left:3px solid var(--amber)}
@keyframes tIn{from{opacity:0;transform:translateX(10px)}to{opacity:1}}

.btn-toggle{display:inline-flex;align-items:center;gap:5px;font-family:"DM Sans",sans-serif;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;border:1.5px solid var(--silver);background:var(--white);color:#888;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.btn-toggle.active{background:var(--blue-pale);border-color:var(--blue);color:var(--blue)}
.btn-toggle .tog-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5;transition:opacity .15s}
.btn-toggle.active .tog-dot{opacity:1}
.spinner{width:16px;height:16px;border:2px solid var(--silver);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--mist)}::-webkit-scrollbar-thumb{background:var(--silver);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img id="login-logo-img" src="https://raw.githubusercontent.com/jnpkwan/Inventory_Hub/main/logo.png" alt="Acacia HBC" style="max-height:100px;max-width:220px;object-fit:contain;margin-bottom:8px;mix-blend-mode:multiply" onerror="this.style.display='none';document.getElementById('login-logo-fallback').style.display='block'">
      <div id="login-logo-fallback" style="display:none">
        <svg width="40" height="40" viewBox="0 0 200 200">
          <ellipse cx="100" cy="72" rx="68" ry="52" fill="#22A749"/>
          <ellipse cx="58" cy="90" rx="38" ry="28" fill="#22A749"/>
          <ellipse cx="142" cy="90" rx="38" ry="28" fill="#22A749"/>
          <rect x="86" y="108" width="28" height="58" rx="5" fill="#1B4DA0"/>
          <path d="M55 166 Q80 158 100 166 Q120 158 145 166" stroke="#1B4DA0" stroke-width="4" fill="none"/>
        </svg>
        <div class="login-a">ACACIA</div>

/* ══════════════════ AUTH ══════════════════ */
async function doLogin() {
  const username = document.getElementById('lu').value.trim();
  const password = document.getElementById('lp').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('login-btn');

  errEl.style.display = 'none';
  if (!username || !password) { showLoginErr('Enter username and password'); return; }

  btn.innerHTML = '<div class="spinner"></div> Signing in…';
  btn.disabled = true;

  try {
    let user;
    if (CFG.apiUrl) {
      user = await gasPost('login', { username, password });
    } else {
      // Offline: accept any credentials, treat as EXECUTIVE
      user = { username, name: username, role: 'EXECUTIVE', assignedStores: '*' };
      CFG.offline = true;
    }
    S.user = user;
    try {
      localStorage.setItem('acacia_session', JSON.stringify(user));
      localStorage.setItem('acacia_lastActive', Date.now());
    } catch(e) {}
    startApp();
  } catch(e) {
    showLoginErr(e.message);
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
}

function offlineMode() {
  S.user = { username: 'demo', name: 'Demo User', role: 'EXECUTIVE', assignedStores: '*' };
  CFG.offline = true;
  startApp();
}

function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'flex';
}

function doLogout() {
  try {
    localStorage.removeItem('acacia_session');
    localStorage.removeItem('acacia_lastActive');
  } catch(e) {}
  clearInterval(S.pollTimer);
  clearInterval(S.idleTimer);
  S.idleTimer = null;
  S.user = null;
  S.records = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
  document.getElementById('login-err').style.display = 'none';
  document.getElementById('login-btn').innerHTML = 'Sign In';
  document.getElementById('login-btn').disabled = false;
}

document.getElementById('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

/* ══════════════════ IDLE AUTO-LOGOUT ══════════════════ */
const IDLE_TIMEOUT_MS = 3 * 60 * 60 * 1000; // 3 hours

function touchActivity() {
  try { localStorage.setItem('acacia_lastActive', Date.now()); } catch(e) {}
}

function startIdleTimer() {
  // Update lastActive on any user interaction
  ['mousemove','keydown','mousedown','touchstart','scroll','click'].forEach(evt =>
    document.addEventListener(evt, touchActivity, { passive: true })
  );
  // Check every 60 seconds whether the session has gone idle
  S.idleTimer = setInterval(() => {
    try {
      const last = parseInt(localStorage.getItem('acacia_lastActive') || '0', 10);
      if (last && Date.now() - last > IDLE_TIMEOUT_MS) {
        clearInterval(S.idleTimer);
        toast('Session expired after 3 hours of inactivity.', 'warn');
        setTimeout(doLogout, 2000);
      }
    } catch(e) {}
  }, 60000);
}

/* ══════════════════ SESSION RESTORE ══════════════════ */
(function restoreSession() {
  try {
    const saved = localStorage.getItem('acacia_session');
    if (saved) {
      const user = JSON.parse(saved);
      if (user && user.username && user.role) {
        // Reject sessions that have been idle for more than 3 hours
        const last = parseInt(localStorage.getItem('acacia_lastActive') || '0', 10);
        if (last && Date.now() - last > IDLE_TIMEOUT_MS) {
          localStorage.removeItem('acacia_session');
          localStorage.removeItem('acacia_lastActive');
          return; // stay on login screen
        }
        S.user = user;
        startApp();
        return;
      }
    }
  } catch(e) {}
  // No saved session — stay on login screen
})();

/* ══════════════════ APP START ══════════════════ */
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set API URL display


  // User chip
  const u = S.user;
  const av = document.getElementById('user-av');
  av.textContent = (u.name||u.username)[0].toUpperCase();
  av.style.background = ROLE_COLORS[u.role] || '#555';
  document.getElementById('user-nm').textContent = u.name || u.username;
  document.getElementById('user-role-badge').textContent = u.role;

  // Hide Add CDF button for COORDINATOR role — read-only access
  const addBtn = document.querySelector('button[onclick="openAddModal()"]');
  if (addBtn) addBtn.style.display = u.role === 'COORDINATOR' ? 'none' : '';

  // Default hide-received: on for IS/COORDINATOR, off for EXECUTIVE
  S.hideReceived = (u.role === 'IS' || u.role === 'COORDINATOR');
  const hideBtn = document.getElementById('hide-recv-btn');
  if (hideBtn) hideBtn.classList.toggle('active', S.hideReceived);

  // Month tabs
  const sel = document.getElementById('month-sel');
  // Only populate months that exist in the data (or all 12 if no data yet)
  const dataMonths = [...new Set((S.records.length ? S.records : OFFLINE_DATA).map(r=>r.month))];
  const showMonths = MONTHS.filter(m => dataMonths.includes(m));
  const listToShow = showMonths.length ? showMonths : MONTHS;
  sel.innerHTML = listToShow.map(m =>
    `<option value="${m}"${m===S.month?' selected':''}>${m.charAt(0)+m.slice(1).toLowerCase()}</option>`
  ).join('');

  loadData();

  // Poll every 30s if connected
  if (!CFG.offline && CFG.apiUrl) {
    S.pollTimer = setInterval(loadData, 30000);
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  // Start idle auto-logout timer
  touchActivity();
  startIdleTimer();
}

/* ══════════════════ DATA ══════════════════ */
async function loadData() {
  setConn('syncing', 'Syncing…');
  try {
    let records;
    if (CFG.offline || !CFG.apiUrl) {
      // Use embedded offline data filtered by role
      records = OFFLINE_DATA;
      CFG.offline = true;
      setConn('offline', 'Offline / Demo');
    } else {
      records = await gasGet('getCDFs', {
        username: S.user.username,
        month:    S.month
      });
      setConn('online', 'Live');
      // Normalize date fields from Sheets (may arrive as full timestamp strings)
      const DATE_FIELDS = ['dWhs','dSdc','dDirect','dCdc','dSdc2','dCdc2','dRecv'];
      records = records.map(r => {
        DATE_FIELDS.forEach(f => {
          if (r[f] && typeof r[f]==='string' && !r[f].match(/^\d{4}-\d{2}-\d{2}$/)) {
            const d = new Date(r[f]);
            if (!isNaN(d)) {
              r[f] = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
            }
          }
        });
        return r;
      });
    }

    // Role filter on offline data
    if (CFG.offline && (S.user.role === 'IS' || S.user.role === 'COORDINATOR')) {
      const assigned = (S.user.assignedStores||'').split(',').map(s=>s.trim().toUpperCase());
      records = records.filter(r => assigned.includes((r.store||'').toUpperCase()));
    }

    // Month filter on offline data (server filters when online)
    if (CFG.offline) {
      records = records.filter(r => r.month === S.month);
    }

    S.records = records;
    document.getElementById('last-sync').textContent = 'Updated ' + fmtTime(new Date());
    renderAll();
  } catch(e) {
    setConn('offline', 'Offline');
    toast('Could not sync: ' + e.message, 'warn');
    // Fall back to offline data
    S.records = OFFLINE_DATA.filter(r => r.month === S.month);
    renderAll();
  }
}

/* ══════════════════ RENDER ══════════════════ */
function renderAll() {
  const filtered = getFiltered();
  renderSummary(S.records);
  renderTable(filtered);
  const total = S.records.length;
  const pill = document.getElementById('total-pill');
  if (pill) pill.textContent = total + ' CDF' + (total !== 1 ? 's' : '');
  const rc = document.getElementById('rc');
  if (rc) rc.textContent = filtered.length < total ? filtered.length + ' shown' : '';
  document.getElementById('tcard-title').textContent =
    S.month.charAt(0) + S.month.slice(1).toLowerCase() + ' — CDF Records';
}

function toggleHideReceived() {
  S.hideReceived = !S.hideReceived;
  S.expandedId = null;
  const btn = document.getElementById('hide-recv-btn');
  if (btn) btn.classList.toggle('active', S.hideReceived);
  renderAll();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const fRoute = document.getElementById('f-route').value;
  const fType  = document.getElementById('f-type').value;
  return S.records.filter(r => {
    if (S.hideReceived && (r.status === 'Received' || r.status === 'Completed')) return false;
    if (S.statusFilter === '__attn') { if (!S._attnIds || !S._attnIds.has(r.id||r.cdf)) return false; }
    else if (S.statusFilter && r.status !== S.statusFilter) return false;
    if (fRoute && r.route !== fRoute) return false;
    if (fType  && r.type  !== fType)  return false;
    if (search && !(r.store||'').toLowerCase().includes(search) &&
                  !(r.cdf||'').toLowerCase().includes(search)) return false;
    return true;
  });
}

/* ── Summary cards ── */
function renderSummary(rows) {
  const cnt = {}; Object.keys(STATUS_META).forEach(k => cnt[k]=0);
  rows.forEach(r => { if(cnt[r.status]!==undefined) cnt[r.status]++; });
  const total = rows.length;
  // Needs Attention: not received/completed and no date movement in >7 days
  const needsAttn = rows.filter(r => {
    if (r.status === 'Received' || r.status === 'Completed') return false;
    const today = new Date();
    const dates = [r.dWhs,r.dSdc,r.dDirect,r.dCdc,r.dSdc2,r.dCdc2,r.dRecv]
      .filter(d => d && d.match(/^\d{4}-\d{2}-\d{2}/));
    if (!dates.length) return false;
    const latest = dates.map(d => new Date(d)).filter(d => !isNaN(d)).sort((a,b)=>b-a)[0];
    if (!latest) return false;
    return (today - latest) / (1000*60*60*24) > 7;
  });
  const cards = [
    {k:'Preparing Order',  cls:'c-prep', n:cnt['Preparing Order'],  l:'Preparing Order',  d:''},
    {k:'Pending Dispatch', cls:'c-pd',   n:cnt['Pending Dispatch'], l:'Pending Dispatch', d:''},
    {k:'On Hold',          cls:'c-hold', n:cnt['On Hold'],          l:'On Hold',          d:''},
    {k:'In Transit',       cls:'c-tr',   n:cnt['In Transit'],       l:'In Transit',       d:''},
    {k:'Received',         cls:'c-recv', n:cnt['Received'],         l:'Received',         d:total?Math.round(cnt['Received']/total*100)+'%':''},
    {k:'__attn',           cls:'c-attn', n:needsAttn.length,        l:'Needs Attention',  d:'> 7 days no movement'}
  ];
  document.getElementById('summary').innerHTML = cards.map(c=>`
    <div class="sc ${c.cls}${S.statusFilter===c.k?' active':''}" onclick="setStatusFilter('${c.k}')">
      <div class="sn">${c.n}</div><div class="sl">${c.l}</div>
      ${c.d?`<div class="sd" style="color:${c.cls==='c-attn'&&c.n>0?'#C0392B':c.cls==='c-recv'?'#22A749':'inherit'}">${c.d}</div>`:''}
    </div>`).join('');
  // store needs-attention IDs for filtering
  S._attnIds = new Set(needsAttn.map(r=>r.id||r.cdf));
}

/* ── Table ── */
function renderTable(rows) {
  if(!rows) rows = getFiltered();
  rows = [...rows].sort((a,b) => {
    let av = S.sortField==='_transit' ? (tdDays(a)||0) : (a[S.sortField]||'');
    let bv = S.sortField==='_transit' ? (tdDays(b)||0) : (b[S.sortField]||'');
    return S.sortDir==='asc'
      ? String(av).localeCompare(String(bv),undefined,{numeric:true})
      : String(bv).localeCompare(String(av),undefined,{numeric:true});
  });

  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="12"><div class="empty-state"><div style="font-size:28px;margin-bottom:8px">📋</div>No records match your filters</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const sm   = STATUS_META[r.status]||STATUS_META['In Transit'];
    const od   = isOverdue(r);
    const td   = tdDays(r);
    const isEx = S.expandedId === r.id || S.expandedId === r.cdf;
    const hub1 = r.dSdc||r.dCdc||'';
    const hub2 = r.dSdc2||r.dCdc2||'';
    const rc   = {Direct:'r-direct','Via SDC':'r-sdc','Via CDC':'r-cdc',Unknown:'r-unknown'}[r.route]||'r-unknown';
    const tc   = {Regular:'t-regular','Spare Parts':'t-sp',Shopee:'t-shopee',Supplies:'t-supplies'}[r.type]||'t-regular';
    const uid  = r.id||r.cdf;

    return `
      <tr class="${od?'overdue-row':''} ${isEx?'exp-row':''}" onclick="toggleExpand('${esc(uid)}')" data-id="${esc(uid)}">
        <td class="td-cdf">${esc(r.cdf)}</td>
        <td class="td-store">${esc(r.store)}</td>
        <td><span class="rb ${rc}">${r.route}</span></td>
        <td><span class="tb ${tc}">${r.type}</span></td>
        <td>
          <span class="sb ${sm.cls}"><span class="dot" style="background:${sm.dot}"></span>${r.status}</span>
          ${od?'<span class="od-flag">⚠ Delayed</span>':''}
        </td>
        <td class="td-date${!r.dWhs?' empty':''}">${fmtD(r.dWhs)}</td>
        <td class="td-date${!hub1?' empty':''}">${fmtD(hub1)}</td>
        <td class="td-date${!hub2?' empty':''}">${fmtD(hub2)}</td>
        <td class="td-date${!r.dRecv?' empty':''}">${r.dRecv?fmtD(r.dRecv):'—'}</td>
        <td class="td-dim" style="font-family:'DM Mono',monospace;${od?'color:#C0392B;font-weight:700':''}">${td!==null?(r.dRecv?td+'d':td+'d ▸'):'—'}</td>
        <td class="td-dim" style="font-family:'DM Mono',monospace;font-size:11px">${esc(r.truck||'—')}</td>
        <td style="font-size:11px;color:#ccc">${isEx?'▲':'▼'}</td>
      </tr>
      ${isEx?buildDetail(r):''}
    `;
  }).join('');
}

function toggleExpand(uid) {
  S.expandedId = S.expandedId===uid ? null : uid;
  renderTable();
}

function buildDetail(r) {
  let steps = [];
  if(r.route==='Direct') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → Store',d:r.dDirect,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else if(r.route==='Via SDC') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → SDC',d:r.dSdc,i:'🚚'},{l:'SDC → Store',d:r.dSdc2,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else if(r.route==='Via CDC') steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'WHS → CDC',d:r.dCdc,i:'🚚'},{l:'CDC → Store',d:r.dCdc2,i:'🚛'},{l:'Received',d:r.dRecv,i:'✅'}
  ]; else steps=[
    {l:'WHS',d:r.dWhs,i:'🏭'},{l:'Dispatched',d:r.dSdc||r.dDirect||r.dCdc||'',i:'🚚'},{l:'Received',d:r.dRecv,i:'✅'}
  ];

  let lastDone=-1;
  steps.forEach((s,i)=>{if(s.d) lastDone=i;});
  const allDone = lastDone===steps.length-1;
  const lastStepIdx = steps.length - 1;
  // Determine if the record is actively in transit (moving toward store)
  const isInTransit = r.status === 'In Transit';
  const tl = steps.map((s,i)=>{
    let st;
    if(i<=lastDone) {
      st = 'done';
    } else if(!allDone && i===lastDone+1 && i!==lastStepIdx) {
      // Active = next step to happen; only pulse/NOW when actually In Transit
      st = isInTransit ? 'active' : 'active-pending';
    } else {
      st = 'pending';
    }
    return `<div class="ts ${st}"><div class="tc">${s.i}</div><div class="tl">${s.l}</div><div class="td2">${s.d?fmtD(s.d):'—'}</div></div>`;
  }).join('');

  const td = tdDays(r);
  const isRestricted = S.user.role === 'IS' || S.user.role === 'COORDINATOR';
  const canEdit = S.user.role==='EXECUTIVE' || S.user.role==='IS';

  return `<tr class="det-tr"><td colspan="12"><div class="det-inner">
    <div class="timeline">${tl}</div>
    <div class="det-meta">
      <div class="dm"><div class="dml">Boxes</div><div class="dmv">${esc(r.boxes||'—')}</div></div>
      <div class="dm"><div class="dml">Truck / Plate</div><div class="dmv" style="font-family:'DM Mono',monospace">${esc(r.truck||'—')}</div></div>
      <div class="dm"><div class="dml">CAS No.</div><div class="dmv" style="font-family:'DM Mono',monospace">${esc(r.cas||'—')}</div></div>
      <div class="dm"><div class="dml">Transit Days</div><div class="dmv" style="${isOverdue(r)?'color:#C0392B;font-weight:700':''}">${td!==null?td+' days':'—'}</div></div>
      ${r.remarks?`<div class="dm"><div class="dml">Remarks</div><div class="dmv">${esc(r.remarks)}</div></div>`:''}
      ${r.updatedBy?`<div class="dm"><div class="dml">Last Updated By</div><div class="dmv">${esc(r.updatedBy)}</div></div>`:''}
      <div class="det-actions">
        ${canEdit?`<button class="btn btn-blue btn-sm" onclick="event.stopPropagation();openEditModal(this.dataset.uid)" data-uid="${esc(r.id||r.cdf)}">✏ Edit</button>`:''}
        ${(S.user.role==='EXECUTIVE')?`<button class="btn btn-outline btn-sm" style="color:var(--red);border-color:var(--red-mid)" onclick="event.stopPropagation();deleteRecord(this.dataset.uid)" data-uid="${esc(r.id||r.cdf)}">✕ Delete</button>`:''}
      </div>
    </div>
  </div></td></tr>`;
}

function syncDateLocks() {
  const route  = document.getElementById('f-route-m')?.value || 'Via SDC';
  const dWhs   = document.getElementById('f-dWhs')?.value  || '';
  const hub1   = document.getElementById('f-hub1')?.value  || '';
  const hub2El = document.getElementById('f-hub2');
  const h2cell = document.getElementById('hub2-cell');
  const hub2Visible = h2cell && h2cell.style.display !== 'none';

  const fHub1 = document.getElementById('f-hub1');
  if (fHub1) fHub1.disabled = !dWhs;

  if (hub2El && hub2Visible) hub2El.disabled = !hub1;

  const fRecv = document.getElementById('f-dRecv');
  if (fRecv) {
    if (route === 'Direct') fRecv.disabled = !hub1;
    else fRecv.disabled = !(hub2El?.value);
  }
}

function updateRouteFields() {
  const route = document.getElementById('f-route-m')?.value||'Via SDC';
  const h1lbl = document.getElementById('hub1-lbl');
  const h2lbl = document.getElementById('hub2-lbl');
  const h2row = document.getElementById('hub2-row');
  const h2cell = document.getElementById('hub2-cell');
  if(route==='Direct'){
    if(h1lbl) h1lbl.textContent='WHS → Store (Direct)';
    if(h2lbl) h2lbl.textContent='Received in Store';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='none';
  } else if(route==='Via SDC'){
    if(h1lbl) h1lbl.textContent='WHS → SDC';
    if(h2lbl) h2lbl.textContent='SDC → Stores';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='';
  } else if(route==='Via CDC'){
    if(h1lbl) h1lbl.textContent='WHS → CDC';
    if(h2lbl) h2lbl.textContent='CDC → Stores';
    if(h2row) h2row.style.display='grid';
    if(h2cell) h2cell.style.display='';
  }
  syncDateLocks();
}

function getFormVals() {
  const route  = document.getElementById('f-route-m').value;
  const isDirect = route==='Direct';
  const isSdc    = route==='Via SDC';
  const isCdc    = route==='Via CDC';
  const hub1  = document.getElementById('f-hub1').value;
  const hub2  = document.getElementById('f-hub2').value;
  return {
    cdf:     document.getElementById('f-cdf').value.trim(),
    store:   document.getElementById('f-store').value.trim().toUpperCase(),
    month:   document.getElementById('f-month').value,
    type:    document.getElementById('f-type-m').value,
    route,
    status: (function(){
      const onHold = document.getElementById('f-onhold')?.checked;
      if (onHold) return 'On Hold';
      const dRecv = document.getElementById('f-dRecv').value;
      const hub1v = document.getElementById('f-hub1').value;
      const hub2v = document.getElementById('f-hub2').value;
      const dWhs  = document.getElementById('f-dWhs').value;
      if (dRecv) return 'Received';
      if (route === 'Direct') {
        if (hub1v) return 'In Transit';
        if (dWhs)  return 'Preparing Order';
      } else if (route === 'Via SDC') {
        if (hub2v) return 'In Transit';
        if (hub1v) return 'Pending Dispatch';
        if (dWhs)  return 'Preparing Order';
      } else if (route === 'Via CDC') {
        if (hub2v) return 'In Transit';
        if (hub1v) return 'Pending Dispatch';
        if (dWhs)  return 'Preparing Order';
      }
      return 'Preparing Order';
    })(),
    dWhs:    document.getElementById('f-dWhs').value,
    dSdc:    isSdc  ? hub1 : '',
    dDirect: isDirect?hub1 : '',
    dCdc:    isCdc  ? hub1 : '',
    dSdc2:   isSdc  ? hub2 : '',
    dCdc2:   isCdc  ? hub2 : '',
    dRecv:   document.getElementById('f-dRecv').value,
    boxes:   document.getElementById('f-boxes').value.trim(),
    truck:   document.getElementById('f-truck').value.trim(),
    cas:     document.getElementById('f-cas').value.trim(),
    remarks: document.getElementById('f-remarks').value.trim()
  };
}

function openAddModal() {
  S.editingId = null;
  document.getElementById('mo-title').textContent = 'Add CDF Entry';
  document.getElementById('mo-body').innerHTML = buildForm(null);
  document.getElementById('mo-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveRecord()">Save Entry</button>`;
  document.getElementById('mo').style.display='flex';
  updateRouteFields();
  setTimeout(()=>document.getElementById('f-cdf').focus(),50);
}

function openEditModal(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;
  S.editingId = uid;
  document.getElementById('mo-title').textContent = 'Edit — ' + r.cdf;
  document.getElementById('mo-body').innerHTML = buildForm(r);
  document.getElementById('mo-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveRecord()">Save Changes</button>`;
  document.getElementById('mo').style.display='flex';
  updateRouteFields();
}

function closeModal() {
  document.getElementById('mo').style.display='none';
  S.editingId = null;
}

async function saveRecord() {
  const vals = getFormVals();
  if(!vals.cdf)   { toast('CDF Reference is required','err'); return; }
  if(!vals.store) { toast('Store Name is required','err'); return; }

  const btn = document.querySelector('#mo-footer .btn-primary');
  btn.innerHTML='<div class="spinner"></div> Saving…'; btn.disabled=true;

  try {
    if(S.editingId) {
      await apiUpdateCDF(S.editingId, vals);
    } else {
      await apiAddCDF(vals);
    }
    closeModal();
  } catch(e) {
    toast(e.message, 'err');
    btn.innerHTML='Save'; btn.disabled=false;
  }
}

/* ══════════════════ API CRUD ══════════════════ */
async function apiAddCDF(vals) {
  const tempId = 'local-'+Date.now();
  const rec = {...vals, id:tempId, createdBy:S.user.username,
               createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
  S.records.unshift(rec);
  renderAll();
  toast('CDF entry added');

  if(!CFG.offline && CFG.apiUrl) {
    try {
      const saved = await gasPost('addCDF', {...vals, username:S.user.username});
      const idx = S.records.findIndex(r=>r.id===tempId);
      if(idx>=0) S.records[idx]=saved;
      renderAll();
    } catch(e) { toast('Saved locally — sync failed: '+e.message,'warn'); }
  }
}

async function apiUpdateCDF(uid, vals) {
  const idx = S.records.findIndex(r=>(r.id||r.cdf)===uid);
  if(idx>=0) S.records[idx]={...S.records[idx],...vals,updatedBy:S.user.username,updatedAt:new Date().toISOString()};
  S.expandedId = null;
  renderAll();
  toast('Record updated');

  if(!CFG.offline && CFG.apiUrl) {
    try {
      const id = S.records[idx]?.id||uid;
      await gasPost('updateCDF', {...vals, id, username:S.user.username});
    } catch(e) { toast('Saved locally — sync failed: '+e.message,'warn'); }
  }
}

async function deleteRecord(uid) {
  const r = S.records.find(x=>(x.id||x.cdf)===uid);
  if(!r) return;
  if(!confirm(`Delete ${r.cdf} — ${r.store}?`)) return;
  S.records = S.records.filter(x=>(x.id||x.cdf)!==uid);
  S.expandedId = null;
  renderAll();
  toast('Record deleted','warn');

  if(!CFG.offline && CFG.apiUrl) {
    try { await gasPost('deleteCDF',{id:r.id||uid, username:S.user.username}); }
    catch(e) { toast('Delete sync failed: '+e.message,'warn'); }
  }
}

/* ══════════════════ NAV HELPERS ══════════════════ */
function setMonth(m) {
  S.month = m; S.expandedId=null;
  document.querySelectorAll('.mtab').forEach(el=>el.classList.toggle('active',el.textContent===m.slice(0,3)));
  loadData();
}

function setStatusFilter(k) {
  S.statusFilter = S.statusFilter===k?'':k;
  S.expandedId=null; renderAll();
}

function sortBy(f) {
  if(S.sortField===f) S.sortDir=S.sortDir==='asc'?'desc':'asc';
  else{S.sortField=f;S.sortDir='asc';}
  renderTable();
}

/* ══════════════════ GAS HTTP ══════════════════ */
async function gasPost(action, payload) {
  // Apps Script doesn't handle CORS preflight on POST with application/json.
  // Solution: send everything as GET with payload encoded as a query param.
  const url = new URL(CFG.apiUrl);
  url.searchParams.set('action', action);
  url.searchParams.set('payload', JSON.stringify(payload));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if(!data.ok) throw new Error(data.error||'API error');
  return data.data;
}

async function gasGet(action, params={}) {
  const url = new URL(CFG.apiUrl);
  url.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if(!data.ok) throw new Error(data.error||'API error');
  return data.data;
}

/* ══════════════════ EXPORT ══════════════════ */
function exportCSV() {
  const rows = getFiltered();
  const h=['Month','CDF Ref','Store','Type','Route','Status','WHS','WHS→Hub','Hub→Store','Received','Transit Days','Truck','Boxes','CAS No','Remarks'];
  const lines=[h.join(',')];
  rows.forEach(r=>{
    const td=tdDays(r);
    const h1=r.dSdc||r.dCdc||r.dDirect||'';
    const h2=r.dSdc2||r.dCdc2||'';
    lines.push([r.month,r.cdf,r.store,r.type,r.route,r.status,r.dWhs,h1,h2,r.dRecv,td??'',r.truck,r.boxes,r.cas,r.remarks]
      .map(v=>{const s=String(v||'');return s.includes(',')||s.includes('"')?`"${s.replace(/"/g,'""')}"`  :s}).join(','));
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=`acacia-dispatch-${S.month.toLowerCase()}.csv`;
  a.click();
  toast('CSV exported');
}

/* ══════════════════ UTILS ══════════════════ */
function isOverdue(r) {
  if(r.status!=='In Transit'&&r.status!=='Pending Dispatch'&&r.status!=='Preparing Order') return false;
  if(!r.dWhs) return false;
  return (Date.now()-new Date(r.dWhs))/ 86400000 > (parseInt(document.getElementById('dd')?.value)||7);
}

function tdDays(r) {
  if(!r.dWhs) return null;
  const s=new Date(r.dWhs), e=r.dRecv?new Date(r.dRecv):new Date();
  const d=Math.round((e-s)/86400000);
  return d>=0?d:null;
}

function fmtD(s) {
  if(!s || s==='—') return '—';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Handle YYYY-MM-DD
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return months[parseInt(iso[2])-1]+' '+parseInt(iso[3])+', '+iso[1];
  // Handle full Date string from Google Sheets (e.g. "Fri Apr 24 2026 00:00:00 GMT+0800...")
  const d = new Date(s);
  if(!isNaN(d)) {
    const hr = d.getHours(), mn = d.getMinutes();
    const t = hr===0&&mn===0 ? '' :
      ` ${hr%12||12}:${String(mn).padStart(2,'0')}${hr<12?'AM':'PM'}`;
    return months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+t;
  }
  return s; // fallback: show as-is
}

function fmtTime(d) {
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg,type='ok') {
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${{ok:'✅',err:'❌',warn:'⚠️'}[type]||''}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function setConn(state, label) {
  const dot=document.getElementById('conn-dot');
  const lbl=document.getElementById('conn-lbl');
  if(dot){dot.className='conn-dot '+state;}
  if(lbl) lbl.textContent=label;
  const si=document.getElementById('sync-info');
  if(si) si.innerHTML=state==='syncing'?'<div class="spinner"></div> Syncing…':'';
}
